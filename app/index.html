<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1.0, user-scalable=no">
  <title>Trivia Progresol</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ====== 01 — PORTADA ====== -->
  <section id="screen-portada" class="screen active">
    <div style="height: 480px; width: 100%;"></div>
    <div class="zone-brand" style="height: auto; padding-top: 0;">
      <img src="assets/logo-vertical.svg" class="logo-vertical" alt="Progresol">
    </div>
    <div class="zone-content" style="gap: 20px; padding: 48px 80px 0;">
      <h1 class="t-title">¿Cuánto sabes de construcción?</h1>
      <p class="t-body--secondary" style="font-family: 'SG-Book-15'; font-size: 36px; text-align: center;">Pon a prueba tus conocimientos</p>
    </div>
    <div style="flex: 1;"></div>
    <div class="zone-footer">
      <button class="btn-cta btn-cta--pulse" onclick="game.start()">
        <span class="t-button">INICIAR</span>
      </button>
      <span class="t-footer">Expo Yo Constructor 2026</span>
    </div>
  </section>

  <!-- ====== 02 — INSTRUCCIONES ====== -->
  <section id="screen-instrucciones" class="screen">
    <div class="zone-brand">
      <img src="assets/logo-vertical.svg" class="logo-vertical--md" alt="Progresol" style="width: 280px;">
    </div>
    <div class="zone-content gap-48">
      <h2 class="t-title t-title--green" style="font-size: 56px;">¿Cómo jugar?</h2>
      <div style="display: flex; flex-direction: column; gap: 36px; width: 100%; max-width: 860px;">
        <div class="rule-item">
          <div class="rule-icon"><span class="t-number">10</span></div>
          <span class="t-body">Responde 10 preguntas sobre construcción</span>
        </div>
        <div class="rule-item">
          <div class="rule-icon"><span class="t-number">15</span></div>
          <span class="t-body">Tienes 15 segundos por pregunta</span>
        </div>
        <div class="rule-item">
          <div class="rule-icon"><span class="t-number">&#9733;</span></div>
          <span class="t-body">Descubre tu nivel de constructor</span>
        </div>
      </div>
    </div>
    <div class="zone-footer">
      <button class="btn-cta" onclick="game.showQuestion()">
        <span class="t-button">COMENZAR</span>
      </button>
      <span class="t-footer">Expo Yo Constructor 2026</span>
    </div>
  </section>

  <!-- ====== 03 — PREGUNTA ====== -->
  <section id="screen-pregunta" class="screen">
    <div class="progress-bar">
      <div class="progress-segments" id="progress-segments"></div>
      <span class="t-indicator" id="progress-text">1 de 10</span>
    </div>
    <div class="zone-content zone-content--question">
      <p class="t-question" id="question-text"></p>
    </div>
    <div id="feedback-block" class="feedback-block" style="display: none;"></div>
    <div class="zone-interactive" id="options-container"></div>
    <div class="timer" id="timer">
      <span class="t-timer" id="timer-text">15</span>
      <div class="timer-bar">
        <div class="timer-fill" id="timer-fill" style="width: 100%;"></div>
      </div>
    </div>
  </section>

  <!-- ====== 06/07/08 — RESULTADO ====== -->
  <section id="screen-resultado" class="screen">
    <div class="zone-brand">
      <img src="assets/logo-vertical.svg" class="logo-vertical--md" alt="Progresol" style="width: 280px;">
    </div>
    <div class="zone-content">
      <span class="t-score" id="result-score"></span>
      <div class="badge" id="result-badge">
        <span class="t-badge" id="result-tier"></span>
      </div>
      <div class="lottie-placeholder" id="result-icon">
        <span style="font-size: 48px;" id="result-emoji"></span>
      </div>
      <p class="t-message" id="result-message"></p>
    </div>
    <div class="zone-footer">
      <button class="btn-cta" onclick="game.reset()">
        <span class="t-button t-button--sm">VOLVER A JUGAR</span>
      </button>
      <span class="t-footer">Expo Yo Constructor 2026</span>
    </div>
  </section>

  <script src="js/game.js"></script>
</body>
</html>
